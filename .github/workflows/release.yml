name: Manual Build And Release APK

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: "Path to config.toml"
        required: false
        default: "config.toml"
      release_tag:
        description: "Release tag (leave empty to auto-generate)"
        required: false
        default: ""
      release_name:
        description: "Release name (leave empty to auto-generate)"
        required: false
        default: ""
      force:
        description: "Use --force while building"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PATCH_CLI_REPO: MorpheApp/morphe-cli
  PATCHES_REPO: MorpheApp/morphe-patches
  MICROG_REPO: MorpheApp/MicroG-RE

permissions:
  contents: write

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.release_check.outputs.should_skip }}
      matched_release: ${{ steps.release_check.outputs.matched_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Existing Published Combo
        id: release_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          RELEASE_SOURCE_SCOPE: manual
        run: node ./scripts/ci/check-release-exists.js

  build-channel:
    needs: precheck
    if: ${{ needs.precheck.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Dependencies
        run: npm ci

      - name: Restore Download Cache
        uses: actions/cache@v4
        with:
          path: downloads
          key: apk-${{ runner.os }}-${{ hashFiles('config.toml') }}
          restore-keys: |
            apk-${{ runner.os }}-

      - name: Resolve Channel Status
        id: channel_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: node ./scripts/ci/check-channel-release.js --channel "${{ matrix.channel }}"

      - name: Reuse Existing Channel Assets
        if: ${{ steps.channel_check.outputs.should_build != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: >
          node ./scripts/ci/reuse-channel-assets.js
          --channel "${{ matrix.channel }}"
          --release-id "${{ steps.channel_check.outputs.matched_release_id }}"
          --patch-file "${{ steps.channel_check.outputs.patch_file }}"
          --cli-file "${{ steps.channel_check.outputs.cli_file }}"
          --output-dir ./output
          --cache-dir ./downloads/release-assets

      - name: Build Channel
        if: ${{ steps.channel_check.outputs.should_build == 'true' }}
        env:
          PATCH_KEYSTORE_BASE64: ${{ secrets.PATCH_KEYSTORE_BASE64 || secrets.MORPHE_KEYSTORE_BASE64 }}
          APKMIRROR_CF_RETRIES: "2"
        run: |
          configPath="${{ github.event.inputs.config_path }}"
          if [ -z "$configPath" ]; then
            configPath="config.toml"
          fi
          args=(./scripts/ci/build-channel.js --config "$configPath" --channel "${{ matrix.channel }}")
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          node "${args[@]}"

      - name: Upload Channel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: channel-${{ matrix.channel }}
          path: |
            output/**/*.apk
            **/release-metadata-${{ matrix.channel }}.json
          if-no-files-found: error

  release:
    needs: [precheck, build-channel]
    if: ${{ needs.precheck.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Download Channel Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: channel-*
          path: .
          merge-multiple: true

      - name: Merge Channel Metadata
        run: |
          configPath="${{ github.event.inputs.config_path }}"
          if [ -z "$configPath" ]; then
            configPath="config.toml"
          fi
          node ./scripts/ci/merge-channel-metadata.js \
            --config "$configPath" \
            --output ./output/release-metadata.json \
            --input ./output/release-metadata-stable.json \
            --input ./output/release-metadata-dev.json

      - name: Generate Release Notes
        run: >
          node ./scripts/ci/generate-release-notes.js
          --metadata ./output/release-metadata.json
          --output ./output/release-notes.md

      - name: Append Release Source Marker
        run: |
          echo "" >> ./output/release-notes.md
          echo "workflow_source: manual" >> ./output/release-notes.md

      - name: Resolve Latest MicroG Asset
        id: microg_meta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ./scripts/ci/resolve-microg-release.js --repo "${{ env.MICROG_REPO }}"

      - name: Restore MicroG Cache
        uses: actions/cache@v4
        with:
          path: downloads/microg
          key: microg-${{ runner.os }}-${{ steps.microg_meta.outputs.asset_name }}
          restore-keys: |
            microg-${{ runner.os }}-

      - name: Fetch MicroG APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          node ./scripts/ci/fetch-microg-asset.js
          --name "${{ steps.microg_meta.outputs.asset_name }}"
          --url "${{ steps.microg_meta.outputs.asset_url }}"
          --cache-dir ./downloads/microg
          --output-dir ./output

      - name: Resolve Release Meta
        id: release_meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="v$(date +'%Y.%m.%d-%H%M%S')"
          fi

          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            name="${{ github.event.inputs.release_name }}"
          else
            name="Morphe Patch Build (Manual) $tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body_path: output/release-notes.md
          files: |
            output/**/*.apk
            output/microg-*.apk
            output/release-metadata.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
